apiVersion: apps/v1
kind: Deployment
metadata:
  name: glpi
  namespace: glpi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: glpi
  template:
    metadata:
      labels:
        app: glpi
    spec:
      containers:
        - name: glpi
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 80

          volumeMounts:
            - name: glpi-storage
              mountPath: /var/www/html

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 10

      volumes:
        - name: glpi-storage
          persistentVolumeClaim:
            claimName: glpi-pvc
