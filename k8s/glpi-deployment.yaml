apiVersion: apps/v1
kind: Deployment
metadata:
  name: glpi
  namespace: glpi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glpi
  template:
    metadata:
      labels:
        app: glpi
    spec:
      containers:
        - name: glpi
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 80
          volumeMounts:
            - name: glpi-storage
              mountPath: /var/www/html/files
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: glpi-storage
          persistentVolumeClaim:
            claimName: glpi-pvc
