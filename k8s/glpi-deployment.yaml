apiVersion: apps/v1
kind: Deployment
metadata:
  name: glpi
  namespace: glpi
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: glpi
  template:
    metadata:
      labels:
        app: glpi
    spec:
      securityContext:
        fsGroup: 33

      # ✅ FIX สำคัญ: แก้ permission ก่อน container run
      initContainers:
        - name: fix-permission
          image: busybox
          command: ["sh", "-c", "chown -R 33:33 /var/www/html"]
          volumeMounts:
            - name: glpi-storage
              mountPath: /var/www/html

      containers:
        - name: glpi
          image: IMAGE_PLACEHOLDER

          securityContext:
            runAsUser: 33
            runAsGroup: 33

          ports:
            - containerPort: 80

          volumeMounts:
            - name: glpi-storage
              mountPath: /var/www/html

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6

      volumes:
        - name: glpi-storage
          persistentVolumeClaim:
            claimName: glpi-pvc
